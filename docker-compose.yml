services:
  postgres:
    image: postgres:16-alpine
    container_name: nexiora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexiora_ev
    volumes:
      - nexiora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexiora_ev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexiora_pg_data:
